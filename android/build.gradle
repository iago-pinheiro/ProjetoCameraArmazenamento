// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    // AGP 8.9.1 exigido pelo react-native-vision-camera v5 (androidx.camera 1.7.0-alpha01 e androidx.core 1.17.0)
    classpath('com.android.tools.build:gradle:8.9.1')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20')
  }
}

// Versões do SDK exigidas pelo react-native-vision-camera v5 e react-native-nitro-modules
// Precisam ser definidas aqui para que todos os sub-projetos usem os mesmos valores
ext {
  compileSdkVersion   = 36
  targetSdkVersion    = 36
  minSdkVersion       = 24
  ndkVersion          = "27.1.12297006"
  kotlinVersion       = "2.1.20"
  buildToolsVersion   = "35.0.0"
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
